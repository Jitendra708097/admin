name: Deploy Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Admin on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT || 22 }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            echo "Deploying Admin..."
            cd "${{ secrets.ADMIN_PATH }}"

            git pull --ff-only origin main

            if [ ! -d "dist" ]; then
              echo "dist folder not found. Build locally and commit dist before deploying."
              exit 1
            fi

            sudo nginx -t
            sudo systemctl reload nginx

            echo "Admin deployment complete."
